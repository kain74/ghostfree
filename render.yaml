services:
    - type: web
      name: ghostfree-api
      runtime: node
      plan: free
      rootDir: .
      buildCommand: npm install; npm run db:generate; npm run db:migrate:deploy || echo "Migration skipped"
      startCommand: npm run server
      autoDeploy: true
      envVars:
          - key: DATABASE_URL
            sync: false
          - key: ADMIN_SECRET
            sync: false
          - key: FRONTEND_URL
            sync: false
          - key: PORT
            value: 4000
